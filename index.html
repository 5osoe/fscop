<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مدير الخطوط | Font Pro</title>
    <meta name="description" content="نظام إدارة ومعاينة الخطوط الاحترافي">
    
    <!-- خطوط عربية احترافية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- أيقونات -->
    <script src="https://unpkg.com/lucide@latest" defer></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- الشريط العلوي الثابت -->
    <header class="app-header">
        <div class="header-inner">
            <div class="brand">
                <div class="logo-box">
                    <i data-lucide="type"></i>
                </div>
                <h1>مدير الخطوط</h1>
            </div>

            <div class="header-controls">
                <!-- حالة الذاكرة -->
                <div class="storage-indicator" title="حالة التخزين">
                    <div class="storage-text">
                        <span id="countDisplay">0</span> / 750
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="storageFill"></div>
                    </div>
                </div>

                <!-- زر الرفع -->
                <label class="btn btn-primary">
                    <i data-lucide="upload-cloud"></i>
                    <span class="hide-mobile">رفع خطوط</span>
                    <input type="file" id="fileUpload" multiple accept=".ttf,.otf,.woff,.woff2" hidden>
                </label>
            </div>
        </div>

        <!-- شريط الأدوات (بحث + معاينة) -->
        <div class="toolbar">
            <div class="search-group">
                <i data-lucide="search" class="icon-gray"></i>
                <input type="text" id="searchInput" placeholder="بحث باسم الخط...">
            </div>
            
            <div class="preview-group">
                <input type="text" id="previewInput" value="سبحان الله وبحمده" placeholder="نص المعاينة...">
            </div>

            <div class="display-settings">
                <div class="control-box">
                    <button id="sizeDec" aria-label="تصغير"><i data-lucide="minus"></i></button>
                    <span id="sizeValue">32</span>
                    <button id="sizeInc" aria-label="تكبير"><i data-lucide="plus"></i></button>
                </div>
                <div class="color-box">
                    <input type="color" id="colorPicker" value="#000000">
                </div>
            </div>
        </div>
    </header>

    <!-- منطقة العمل الرئيسية -->
    <main class="main-container">
        <!-- شبكة الخطوط -->
        <div id="fontGrid" class="font-grid">
            <!-- يتم توليد البطاقات هنا بالجافاسكربت -->
        </div>

        <!-- الحالة الفارغة -->
        <div id="emptyState" class="empty-state">
            <div class="empty-icon">
                <i data-lucide="folder-open"></i>
            </div>
            <h3>المكتبة فارغة</h3>
            <p>قم برفع ملفات الخطوط (TTF, OTF, WOFF) لتبدأ العمل</p>
            <label class="btn btn-outline">
                استعراض الملفات
                <input type="file" id="fileUploadEmpty" multiple accept=".ttf,.otf,.woff,.woff2" hidden>
            </label>
        </div>
    </main>

    <!-- الشريط السفلي للجوال / إجراءات إضافية -->
    <div class="actions-bar">
        <button class="action-btn" id="btnExport">
            <i data-lucide="file-down"></i>
            <span>تصدير PDF</span>
        </button>
        <button class="action-btn danger" id="btnClear">
            <i data-lucide="trash-2"></i>
            <span>حذف الكل</span>
        </button>
    </div>

    <!-- منطقة الطباعة المخفية -->
    <div id="printArea">
        <div class="print-header">
            <h2>تقرير الخطوط</h2>
            <p id="printDate"></p>
        </div>
        <table class="print-table">
            <thead>
                <tr>
                    <th width="25%">اسم الخط</th>
                    <th width="55%">المعاينة</th>
                    <th width="20%">الوسم</th>
                </tr>
            </thead>
            <tbody id="printBody"></tbody>
        </table>
    </div>

    <!-- الإشعارات -->
    <div id="toast" class="toast">تمت العملية بنجاح</div>

    <script src="app.js"></script>
</body>
</html>
