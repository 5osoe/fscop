<!-- PWA Install Handler -->
<script>
(function () {
    let deferredPrompt = null;
    const pwaSection = document.getElementById('pwaSection');
    const pwaBtn     = document.getElementById('pwaInstallBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if (pwaSection) {
            pwaSection.style.display = 'block';
            if (window.lucide) lucide.createIcons({ root: pwaSection });
        }
    });

    if (pwaBtn) {
        pwaBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted' && pwaSection) pwaSection.style.display = 'none';
            deferredPrompt = null;
        });
    }

    window.addEventListener('appinstalled', () => {
        if (pwaSection) pwaSection.style.display = 'none';
        deferredPrompt = null;
    });

    // Sync capacity bar with app state
    function syncCapacity() {
        const total = parseInt(document.getElementById('totalFonts')?.textContent) || 0;
        const fill  = document.getElementById('capacityFill');
        const label = document.getElementById('capacityLabel');
        if (fill)  fill.style.width  = Math.min((total / 750) * 100, 100) + '%';
        if (label) label.textContent = total + ' / 750 خط';
    }

    const observer = new MutationObserver(syncCapacity);
    const totalEl  = document.getElementById('totalFonts');
    if (totalEl) observer.observe(totalEl, { childList: true, characterData: true, subtree: true });
})();
</script>
