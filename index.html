<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>FontScope — مدير خطوط احترافي</title>
    <meta name="description" content="FontScope أداة متصفح لإدارة واستعراض الخطوط العربية والإنجليزية بسهولة. رفع خطوط TTF، OTF، WOFF وتصنيفها وتصديرها.">
    <meta name="keywords" content="خطوط عربية, مدير خطوط, font manager, Arabic fonts, TTF, OTF, WOFF, معاينة خطوط">
    <meta name="author" content="QNest">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#D32F2F">

    <!-- Open Graph -->
    <meta property="og:title" content="FontScope — مدير خطوط احترافي">
    <meta property="og:description" content="أداة متصفح لرفع الخطوط واستعراضها وتصنيفها وتصديرها بسهولة تامة.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="icon-512.png">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <link rel="icon" type="image/png" href="icon-512.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest" defer></script>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header -->
    <header class="main-header">
        <div class="brand-name">FontScope</div>
        <div class="header-actions">
            <label class="icon-btn" title="رفع خطوط">
                <i data-lucide="upload-cloud"></i>
                <input type="file" id="fileUpload" multiple accept=".ttf,.otf,.woff,.woff2" hidden>
            </label>
            <button class="icon-btn" id="btnOpenTune" title="تخصيص العرض">
                <i data-lucide="sliders-horizontal"></i>
            </button>
            <button class="icon-btn" id="btnOpenMenu" title="القائمة">
                <i data-lucide="menu"></i>
            </button>
        </div>
    </header>

    <!-- Customize Panel -->
    <div id="panelCustomize" class="control-panel panel-tune">
        <div class="panel-header">
            <h3>تخصيص العرض</h3>
            <button class="close-panel"><i data-lucide="x"></i></button>
        </div>
        <div class="panel-body">
            <div class="input-group">
                <label>نص المعاينة</label>
                <input type="text" id="previewInput" value="سبحان الله وبحمده" placeholder="نص المعاينة...">
            </div>
            <div class="row-group">
                <div class="control-box">
                    <button id="sizeDec"><i data-lucide="minus"></i></button>
                    <span id="sizeValue">32</span>
                    <button id="sizeInc"><i data-lucide="plus"></i></button>
                </div>
                <div class="color-wrapper">
                    <input type="color" id="colorPicker" value="#000000">
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Panel -->
    <div id="panelSettings" class="control-panel panel-settings">
        <div class="panel-header">
            <h3>المكتبة والإعدادات</h3>
            <button class="close-panel"><i data-lucide="x"></i></button>
        </div>
        <div class="panel-body">
            <div class="search-box">
                <i data-lucide="search"></i>
                <input type="text" id="searchInput" placeholder="بحث باسم الخط...">
            </div>
            <div class="stats-box">
                <span>الخطوط المحملة</span>
                <span class="stats-val"><b id="countDisplay">0</b> / 750</span>
            </div>
            <hr class="divider">
            <div class="actions-group-ver">
                <button class="btn btn-primary" id="btnInstallApp" style="display: none;">
                    <i data-lucide="download"></i>
                    <span>تثبيت التطبيق</span>
                </button>
                <div class="actions-group">
                    <button class="btn btn-outline" id="btnExport">
                        <i data-lucide="file-down"></i>
                        <span>تصدير PDF</span>
                    </button>
                    <button class="btn btn-danger" id="btnClear">
                        <i data-lucide="trash-2"></i>
                        <span>حذف الكل</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Overlay -->
    <div id="overlay" class="overlay"></div>

    <!-- Upload Progress Bar -->
    <div id="uploadProgress" class="upload-progress">
        <div class="up-info">
            <span id="upText">جاري رفع الخطوط...</span>
            <span id="upPct">0%</span>
        </div>
        <div class="up-track">
            <div class="up-fill" id="upBar"></div>
        </div>
    </div>

    <!-- Main Grid -->
    <main class="main-container">
        <div id="fontGrid" class="font-grid"></div>
        <div id="emptyState" class="empty-state">
            <div class="empty-icon">
                <i data-lucide="type"></i>
            </div>
            <h3>المكتبة فارغة</h3>
            <p>اضغط أيقونة الرفع لإضافة خطوط</p>
        </div>
    </main>

    <!-- Print Area -->
    <div id="printArea">
        <table class="print-table">
            <thead>
                <tr>
                    <th width="25%">اسم الخط</th>
                    <th width="60%">المعاينة</th>
                    <th width="15%">الوسم</th>
                </tr>
            </thead>
            <tbody id="printBody"></tbody>
        </table>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">إشعار</div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(console.error);
        }
    </script>
</body>
</html>
