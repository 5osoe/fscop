<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Font Scope | OS</title>
<meta name="theme-color" content="#000000">
<meta name="description" content="A minimal, grid-based font manager inspired by Nothing OS.">
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- Icons -->
<script src="https://unpkg.com/lucide@latest" defer></script>
<link rel="stylesheet" href="styles.css">
</head>
<body data-theme="dark">

<!-- App Layout -->
<div class="app-layout">
  
  <!-- 1. Sidebar Controls (Left on LTR, Right on RTL) -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">
        <span class="dot-matrix">N</span>
      </div>
      <div class="brand-text">
        <span class="font-title">FONT SCOPE</span>
        <span class="font-ver">V5.0</span>
      </div>
    </div>

    <div class="sidebar-scroll">
      <!-- Upload Section -->
      <div class="control-group">
        <label class="btn-pill btn-accent">
          <i data-lucide="plus"></i>
          <span>رفع خطوط</span>
          <input type="file" id="fileInput" multiple accept=".ttf,.otf,.woff2,.woff" hidden>
        </label>
      </div>

      <!-- Stats -->
      <div class="stat-card">
        <span class="stat-label">المكتبة</span>
        <div class="stat-value">
          <span id="totalFonts">0</span>
          <span class="stat-max">/ 750</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="capFill"></div>
        </div>
      </div>

      <div class="divider-dotted"></div>

      <!-- Filters & Actions -->
      <nav class="nav-menu">
        <button class="nav-item" id="btnTheme">
          <i data-lucide="sun"></i>
          <span>المظهر</span>
        </button>
        <button class="nav-item" id="btnExport">
          <i data-lucide="file-down"></i>
          <span>تقرير PDF</span>
        </button>
        <button class="nav-item danger" id="btnClear">
          <i data-lucide="trash"></i>
          <span>حذف الكل</span>
        </button>
      </nav>
    </div>

    <div class="sidebar-footer">
      <span class="sys-status">SYSTEM OK</span>
    </div>
  </aside>

  <!-- 2. Main Content Area -->
  <main class="main-content">
    
    <!-- Sticky Header / Toolbar -->
    <header class="top-bar">
      <!-- Search -->
      <div class="search-box">
        <i data-lucide="search" class="search-icon"></i>
        <input type="text" id="searchInput" placeholder="بحث باسم الخط..." autocomplete="off">
      </div>

      <!-- Global Preview Input -->
      <div class="preview-bar">
        <input type="text" id="previewInput" value="Simplicity is the ultimate sophistication" placeholder="نص المعاينة...">
      </div>

      <!-- Size & Color -->
      <div class="display-controls">
        <div class="size-stepper">
          <button id="btnSizeDown"><i data-lucide="minus"></i></button>
          <span id="sizeVal">32</span>
          <button id="btnSizeUp"><i data-lucide="plus"></i></button>
        </div>
        <div class="color-picker-wrap">
          <input type="color" id="colorInput" value="#FFFFFF">
          <div class="color-indicator" id="colorDot"></div>
        </div>
        <!-- Mobile Menu Toggle -->
        <button class="icon-btn mobile-only" id="btnMenu">
          <i data-lucide="menu"></i>
        </button>
      </div>
    </header>

    <!-- Grid Area -->
    <div class="content-scroll" id="mainScroll">
      <div id="fontGrid" class="grid-layout">
        <!-- Cards will be injected here via JS -->
      </div>
      
      <!-- Empty State -->
      <div id="emptyState" class="empty-state" style="display:none;">
        <div class="empty-graphic">
          <span class="dot-matrix-lg">NULL</span>
        </div>
        <p>لا توجد بيانات. قم برفع ملفات الخطوط.</p>
        <span class="tech-tag">TTF · OTF · WOFF</span>
      </div>
    </div>
  </main>

  <!-- Drop Overlay -->
  <div id="dropOverlay" class="drop-overlay">
    <div class="drop-content">
      <i data-lucide="arrow-down-circle" width="64" height="64"></i>
      <h2>DROP FILES</h2>
    </div>
  </div>

  <!-- Mobile Drawer (Matches Nothing OS style) -->
  <div class="mobile-drawer-overlay" id="mobileOverlay"></div>
  <div class="mobile-drawer" id="mobileDrawer">
    <div class="drawer-header">
      <span>القائمة</span>
      <button class="icon-btn" id="btnCloseDrawer"><i data-lucide="x"></i></button>
    </div>
    <div class="drawer-body">
      <!-- Upload Mobile -->
      <label class="btn-pill btn-accent full-width">
        <i data-lucide="upload-cloud"></i>
        <span>رفع ملفات</span>
        <input type="file" id="fileInputM" multiple accept=".ttf,.otf,.woff2,.woff" hidden>
      </label>
      
      <div class="divider-dotted"></div>
      
      <!-- Export Mobile -->
      <button class="nav-item" id="btnExportM">
        <i data-lucide="file-text"></i>
        <span>تصدير PDF</span>
      </button>
      
      <button class="nav-item danger" id="btnClearM">
        <i data-lucide="trash-2"></i>
        <span>حذف المكتبة</span>
      </button>

      <div class="stat-card mobile-stat">
        <span class="stat-label">المساحة المستخدمة</span>
        <div class="progress-track"><div class="progress-fill" id="capFillM"></div></div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast">
    <span class="toast-dot"></span>
    <span id="toastMsg">Notification</span>
  </div>

</div>

<!-- Hidden Print Area (Strict Table Layout) -->
<div id="printArea" class="print-container">
  <table class="print-table">
    <thead>
      <tr>
        <th class="col-name">Font Name</th>
        <th class="col-preview">Preview</th>
        <th class="col-tag">Tag</th>
      </tr>
    </thead>
    <tbody id="printBody">
      <!-- Rows generated by JS -->
    </tbody>
  </table>
</div>

<script src="app.js"></script>
</body>
</html>
