<body data-theme="light">

<div class="loader"><div class="loader-bar" id="progressFill"></div></div>
<div class="loader-text" id="loaderText">0%</div>
<div class="overlay" id="overlay" onclick="App.toggleSidebar()"></div>

<div class="app-shell">
    <aside class="sidebar" id="sidebar">
        <a href="/" class="brand">
            <div class="brand-icon"><i data-lucide="zap" width="14"></i></div>
            <div class="brand-text">
                <span class="brand-name">Font Scope</span>
                <span class="brand-pro">PRO</span>
            </div>
        </a>

        <div class="sidebar-section">
            <div class="section-title"><i data-lucide="upload" width="10"></i> Upload Fonts</div>
            <label class="upload-zone" id="dropZone">
                <div class="upload-icon-wrap"><i data-lucide="upload-cloud" width="18"></i></div>
                <div class="upload-primary">Drop or Select</div>
                <div class="upload-formats">TTF · OTF · WOFF · WOFF2</div>
                <div class="upload-limit-badge">Max 75 MB per file</div>
                <input type="file" id="fileInput" multiple accept=".ttf,.otf,.woff2,.woff" hidden>
            </label>
        </div>

        <div class="sidebar-section">
            <div class="section-title"><i data-lucide="bar-chart-2" width="10"></i> Stats</div>
            <div class="stat-row">
                <span class="stat-label">إجمالي الخطوط</span>
                <span class="stat-val" id="totalFonts">0</span>
            </div>
            <div class="capacity-wrap">
                <div class="capacity-bar-track"><div class="capacity-bar-fill" id="capacityFill" style="width:0%"></div></div>
                <span class="capacity-label" id="capacityLabel">0 / 750</span>
            </div>
        </div>

        <div class="sidebar-section" id="pwaSection" style="display:none;">
            <div class="section-title"><i data-lucide="smartphone" width="10"></i> Install App</div>
            <button id="pwaInstallBtn" class="btn-pwa">
                <i data-lucide="download" width="13"></i>
                <span>Install as App</span>
            </button>
            <p class="pwa-hint">Works Offline</p>
        </div>

        <div class="sidebar-footer">
            <button onclick="App.clearAll()" class="btn-text danger">
                <i data-lucide="trash-2" width="14"></i>
                <span>حذف المكتبة كاملة</span>
            </button>
            <div class="version-badge"><i data-lucide="shield-check" width="10"></i> V4.0 · 750 FONTS</div>
        </div>
    </aside>

    <main class="workspace">
        <header class="top-nav">
            <button class="btn-icon mobile-btn" onclick="App.toggleSidebar()">
                <i data-lucide="menu" width="18"></i>
            </button>

            <div class="input-group">
                <i data-lucide="type" width="13" class="input-icon"></i>
                <input type="text" id="previewInput" class="input-clean" placeholder="نص المعاينة..." value="سبحان الله وبحمده" autocomplete="off" spellcheck="false">
            </div>

            <div class="nav-actions">
                <div class="search-wrap">
                    <i data-lucide="search" width="13" class="search-icon"></i>
                    <input type="search" id="searchInput" class="input-clean input-search" placeholder="بحث..." autocomplete="off">
                </div>
                <button onclick="App.exportPDF()" class="btn-primary" title="تصدير PDF">
                    <i data-lucide="printer" width="14"></i>
                    <span class="btn-label-responsive">Export</span>
                </button>
                <button onclick="App.toggleTheme()" class="btn-icon" title="تبديل المظهر">
                    <i data-lucide="moon" id="themeIcon" width="16"></i>
                </button>
            </div>
        </header>

        <div class="content-scroll" id="scrollContainer">
            <div id="fontGrid" class="font-grid" role="list"></div>
        </div>
    </main>
</div>

<div id="toast" class="toast">
    <i data-lucide="check-circle" width="14"></i>
    <span id="toastMsg">تمت العملية</span>
</div>

<div id="printContainer">
    <table id="printTable">
        <thead><tr><th style="width:50%">المعاينة</th><th style="width:30%">اسم الخط</th><th style="width:20%">الوسم</th></tr></thead>
        <tbody id="printBody"></tbody>
    </table>
</div>

<script src="app.js"></script>
<script>
(function(){
    var deferred=null,sec=document.getElementById('pwaSection'),btn=document.getElementById('pwaInstallBtn');
    window.addEventListener('beforeinstallprompt',function(e){
        e.preventDefault();deferred=e;
        if(sec){sec.style.display='block';if(window.lucide)lucide.createIcons({root:sec});}
    });
    if(btn){btn.addEventListener('click',async function(){
        if(!deferred)return;deferred.prompt();
        var r=await deferred.userChoice;
        if(r.outcome==='accepted'&&sec)sec.style.display='none';
        deferred=null;
    });}
    window.addEventListener('appinstalled',function(){if(sec)sec.style.display='none';deferred=null;});
    function sync(){
        var t=parseInt(document.getElementById('totalFonts')?.textContent)||0;
        var f=document.getElementById('capacityFill');
        var l=document.getElementById('capacityLabel');
        if(f)f.style.width=Math.min((t/750)*100,100)+'%';
        if(l)l.textContent=t+' / 750';
    }
    var el=document.getElementById('totalFonts');
    if(el)new MutationObserver(sync).observe(el,{childList:true,characterData:true,subtree:true});
})();
</script>
